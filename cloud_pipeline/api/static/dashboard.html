<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sensor Platform Dashboard</title>
    <style>
      :root {
        --bg: #f2f5f7;
        --surface: #ffffff;
        --ink: #1c232b;
        --muted: #5d6a78;
        --accent: #0b6e99;
        --ok: #1f8a5c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: linear-gradient(160deg, #eef3f7 0%, #ddeaf1 45%, #f7fafc 100%);
        color: var(--ink);
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }
      h1 {
        margin-bottom: 0.25rem;
        letter-spacing: 0.5px;
      }
      .subtitle { color: var(--muted); margin-bottom: 1.5rem; }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.8rem;
        margin-bottom: 1rem;
      }
      .card {
        background: var(--surface);
        border-radius: 12px;
        padding: 1rem;
        box-shadow: 0 8px 18px rgba(0,0,0,0.05);
      }
      .card h2 { margin: 0; font-size: 0.95rem; color: var(--muted); }
      .card p { margin: 0.4rem 0 0; font-size: 1.5rem; font-weight: 600; }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 18px rgba(0,0,0,0.05);
      }
      th, td {
        text-align: left;
        padding: 0.7rem 0.8rem;
        border-bottom: 1px solid #edf1f4;
        font-size: 0.92rem;
      }
      th { background: #f9fbfd; color: var(--muted); font-weight: 600; }
      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 0.2rem 0.5rem;
        background: #eaf7f1;
        color: var(--ok);
        font-size: 0.8rem;
      }
      @media (max-width: 700px) {
        th:nth-child(5), td:nth-child(5) { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Smart Sensor Network Platform</h1>
      <p class="subtitle">Live event feed and node health snapshot</p>

      <section class="stats">
        <div class="card"><h2>Events (latest window)</h2><p id="eventsCount">0</p></div>
        <div class="card"><h2>Unique Nodes</h2><p id="nodesCount">0</p></div>
        <div class="card"><h2>Unacked</h2><p id="unackedCount">0</p></div>
      </section>

      <table>
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Node</th>
            <th>Type</th>
            <th>Sensor</th>
            <th>Confidence</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="eventsTable"></tbody>
      </table>
    </div>

    <script>
      async function refresh() {
        const response = await fetch('/v1/dashboard/latest?limit=50');
        const events = await response.json();

        const uniqueNodes = new Set(events.map(e => e.node_id));
        const unacked = events.filter(e => !e.acked).length;

        document.getElementById('eventsCount').textContent = events.length;
        document.getElementById('nodesCount').textContent = uniqueNodes.size;
        document.getElementById('unackedCount').textContent = unacked;

        const tbody = document.getElementById('eventsTable');
        tbody.innerHTML = events.map(e => `
          <tr>
            <td>${new Date(e.ts_ingest).toLocaleString()}</td>
            <td>${e.node_id}</td>
            <td>${e.event_type}</td>
            <td>${e.sensor_type}</td>
            <td>${Number(e.confidence).toFixed(2)}</td>
            <td><span class="badge">${e.acked ? 'acked' : 'new'}</span></td>
          </tr>
        `).join('');
      }

      refresh();
      setInterval(refresh, 3000);
    </script>
  </body>
</html>
